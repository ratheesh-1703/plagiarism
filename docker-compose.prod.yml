version: "3.9"

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: plagiarism_db
      MYSQL_USER: plagiarism
      MYSQL_PASSWORD: plagiarism_password
      MYSQL_ROOT_PASSWORD: root_password
    command: ["--default-authentication-plugin=mysql_native_password"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-php
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: plagiarism_db
      DB_USER: plagiarism
      DB_PASS: plagiarism_password
      JWT_SECRET: CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_64CHARS_MINIMUM_1234567890
      JWT_EXPIRES_HOURS: 24
      JWT_ISSUER: plagiarism-api
      JWT_AUDIENCE: plagiarism-client
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      RATE_LIMIT_PER_MINUTE: 120
      AUTH_RATE_LIMIT_PER_MINUTE: 8
      RATE_LIMIT_DIR: storage/cache/ratelimits
      LOG_DIR: storage/logs
      PLAGIARISM_THRESHOLD: 0.72
      MAX_UPLOAD_MB: 15
      UPLOAD_DIR: storage/uploads
      REPORT_DIR: storage/reports
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend-php/storage:/var/www/html/storage

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "8000:80"
    volumes:
      - ./backend-php:/var/www/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  mysql_data:
