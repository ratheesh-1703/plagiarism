version: "3.9"

services:
  db:
    image: postgres:16
    container_name: plagiarism_db
    environment:
      POSTGRES_DB: plagiarism_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend-php
      dockerfile: Dockerfile
    container_name: plagiarism_backend
    env_file:
      - ./backend-php/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend-php/storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plagiarism_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
